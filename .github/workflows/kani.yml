name: Kani Verification

on:
  push:
    branches: [ main, feat/kani-verification ]
  pull_request:

jobs:
  kani:
    name: Kani Proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: model-checking/kani-github-action@v1
        with:
          working-directory: harness
